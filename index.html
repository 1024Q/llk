<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>连连看</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>连连看</h1>
        <p class="tagline">找到相同图案，按当前转弯次数规则连接并消除它们。</p>
      </div>
    </header>

    <section class="shell" aria-label="连连看游戏">
      <div class="board-wrap">
        <div class="board-stage">
          <svg id="connectionLine" class="connection-line" aria-hidden="true"></svg>
          <div id="board" class="board" aria-label="游戏棋盘"></div>
        </div>
      </div>

      <aside class="side" aria-label="游戏控制">
        <div class="stats">
          <div class="stat"><span>关卡</span><strong id="stage">1</strong></div>
          <div class="stat"><span>最高分</span><strong id="bestScore">0</strong></div>
          <div class="stat"><span>得分</span><strong id="score">0</strong></div>
          <div class="stat"><span>剩余</span><strong id="left">0</strong></div>
          <div class="stat"><span>连击</span><strong id="combo">0</strong></div>
          <div class="stat"><span>时间</span><strong id="time">03:00</strong></div>
        </div>

        <div class="progress" aria-hidden="true"><i id="timeBar"></i></div>

        <div class="levels" aria-label="难度">
          <button type="button" data-level="easy">简单</button>
          <button type="button" data-level="normal" class="active">普通</button>
          <button type="button" data-level="hard">困难</button>
        </div>

        <label class="turn-control" for="turnLimit">
          <span>转弯次数</span>
          <strong id="turnLimitValue">2 次</strong>
          <input type="range" id="turnLimit" min="2" max="5" step="1" value="2">
        </label>

        <div class="mode-controls" aria-label="模式">
          <button type="button" id="normalMode" class="active">闯关模式</button>
          <button type="button" id="dailyMode">每日挑战</button>
        </div>

        <div class="powerups" aria-label="道具">
          <button type="button" id="powerBomb">炸弹 <span id="bombCount">1</span></button>
          <button type="button" id="powerFreeze">冻结 <span id="freezeCount">1</span></button>
          <button type="button" id="powerReveal">放大镜 <span id="revealCount">2</span></button>
        </div>

        <div class="controls">
          <button type="button" id="newGame" class="primary">新游戏</button>
          <button type="button" id="pause">暂停</button>
          <button type="button" id="hint">提示</button>
          <button type="button" id="shuffle" class="warn">洗牌</button>
          <button type="button" id="sound">音效：开</button>
        </div>

        <div id="message" class="message" role="status">点击两张相同的牌开始。</div>

        <div class="leaderboard" aria-label="排行榜">
          <strong>本地排行榜</strong>
          <dl>
            <div><dt>简单</dt><dd id="lbEasy">0</dd></div>
            <div><dt>普通</dt><dd id="lbNormal">0</dd></div>
            <div><dt>困难</dt><dd id="lbHard">0</dd></div>
            <div><dt>每日</dt><dd id="lbDaily">0</dd></div>
            <div><dt>最高关</dt><dd id="lbStage">1</dd></div>
            <div><dt>最快</dt><dd id="lbFast">--</dd></div>
            <div><dt>最长连击</dt><dd id="lbCombo">0</dd></div>
          </dl>
        </div>
      </aside>
    </section>
  </main>

  <div id="resultModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="modal-panel">
      <h2 id="resultTitle">关卡完成</h2>
      <p id="resultSummary"></p>
      <div class="modal-stats">
        <div><span>本关用时</span><strong id="resultTime">00:00</strong></div>
        <div><span>奖励</span><strong id="resultBonus">0</strong></div>
        <div><span>总分</span><strong id="resultScore">0</strong></div>
        <div><span>最长连击</span><strong id="resultCombo">0</strong></div>
      </div>
      <div class="modal-actions">
        <button type="button" id="nextStage" class="primary">下一关</button>
        <button type="button" id="restartFromModal">重新开始</button>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
